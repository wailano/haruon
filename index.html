<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하루온 - 미술 교습소 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- 모바일 헤더 -->
    <header class="mobile-header" id="mobileHeader">
      <button class="icon-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="brand">
        <span class="brand-emoji">🎨</span>
        <span class="brand-name">하루온</span>
      </div>
      <button class="icon-btn" id="headerExportBtn"><i class="fas fa-download"></i></button>
    </header>

    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-lg">
          <span class="brand-emoji-lg">🎨</span>
          <div>
            <div class="brand-name-lg">하루온</div>
            <div class="brand-sub">미술 교습소 관리</div>
          </div>
        </div>
        <button class="icon-btn sidebar-close-btn" id="sidebarClose"><i class="fas fa-times"></i></button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <a class="nav-item active" data-page="dashboard">
          <i class="fas fa-home"></i><span>대시보드</span>
        </a>
        <a class="nav-item" data-page="members">
          <i class="fas fa-users"></i><span>회원 관리</span>
        </a>
        <a class="nav-item" data-page="payments">
          <i class="fas fa-won-sign"></i><span>수납 관리</span>
        </a>
        <a class="nav-item" data-page="classes">
          <i class="fas fa-palette"></i><span>수업 관리</span>
        </a>
        <a class="nav-item" data-page="calendar">
          <i class="fas fa-calendar-alt"></i><span>캘린더</span>
        </a>
        <a class="nav-item" data-page="attendance">
          <i class="fas fa-clipboard-check"></i><span>출석 관리</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-outline-sm" onclick="App.exportData()">
          <i class="fas fa-download"></i> 데이터 백업
        </button>
        <label class="btn-outline-sm" for="importFileInput" style="cursor:pointer;">
          <i class="fas fa-upload"></i> 데이터 복원
        </label>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 메인 콘텐츠 -->
    <main class="content-area">
      <div id="pageContent" class="page-content"></div>
    </main>

    <!-- 하단 네비게이션 (모바일) -->
    <nav class="bottom-nav" id="bottomNav">
      <a class="bnav-item active" data-page="dashboard"><i class="fas fa-home"></i><span>홈</span></a>
      <a class="bnav-item" data-page="members"><i class="fas fa-users"></i><span>회원</span></a>
      <a class="bnav-item" data-page="payments"><i class="fas fa-won-sign"></i><span>수납</span></a>
      <a class="bnav-item" data-page="classes"><i class="fas fa-palette"></i><span>수업</span></a>
      <a class="bnav-item" data-page="calendar"><i class="fas fa-calendar"></i><span>캘린더</span></a>
      <a class="bnav-item" data-page="attendance"><i class="fas fa-check-square"></i><span>출석</span></a>
    </nav>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle"></h3>
        <button class="icon-btn" id="modalClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 파일 입력 (숨김) -->
  <input type="file" id="importFileInput" accept=".json" style="display:none">

  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/members.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/classes.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/attendance.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
